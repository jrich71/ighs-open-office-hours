<header>
  <nav class="navbar">
    <div class="container nav-inner">
      <a class="nav-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
      <ul class="nav-links">
        {% for link in site.nav_links %}
        <li>
          <a href="{{ site.baseurl }}{{ link.url }}"
             {% if page.url == link.url %}class="active"{% endif %}>
            {{ link.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </nav>
</header>
