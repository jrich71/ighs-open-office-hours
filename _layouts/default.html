<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}" />
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />
  <!-- MathJax for equations -->
  <script>
    MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>

  {% include header.html %}

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container footer-inner">
      <span>{{ site.title }} &mdash; UCSF Institute for Global Health Sciences</span>
      <span>Built with <a href="https://jekyllrb.com" target="_blank">Jekyll</a> &amp; hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a></span>
    </div>
  </footer>

</body>
</html>
